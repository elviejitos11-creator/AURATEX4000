<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURATEX</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="manifest" href="/manifest.json" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <h1 class="logo">AURATEX</h1>
    <p class="sub">Acceso restringido</p>

    <div class="tabs">
      <button class="tab active" onclick="showTab('admin')">Admin</button>
      <button class="tab" onclick="showTab('agent')">Telefonista</button>
    </div>

    <div id="adminTab">
      <input id="adminUser" placeholder="Usuario admin" value="admin" />
      <input id="adminPass" type="password" placeholder="Contraseña" value="1234" />
      <button onclick="loginAdmin()">ENTRAR AL PANEL</button>
    </div>

    <div id="agentTab" class="hidden">
      <input id="agentProfile" placeholder="Slug del perfil. Ej: maria-ny" />
      <input id="agentPass" type="password" placeholder="Contraseña telefonista" value="1234" />
      <button onclick="loginAgent()">ENTRAR COMO TELEFONISTA</button>
    </div>

    <p id="loginMsg" class="msg-line"></p>
  </div>

  <script src="/app.js"></script>
</body>
</html>
